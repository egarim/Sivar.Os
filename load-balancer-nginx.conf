# Nginx Configuration for Load Balancer (86.48.30.122)
# Forward dev.sivar.lat to Sivar.Os Dev Server (86.48.30.123)

upstream sivaros_dev {
    server 86.48.30.123:80;
    keepalive 32;
}

server {
    listen 80;
    server_name dev.sivar.lat;
    
    # Forward all traffic to dev server
    location / {
        proxy_pass http://sivaros_dev;
        proxy_http_version 1.1;
        
        # Essential headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (for Blazor)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        
        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Let's Encrypt ACME challenge support
    location /.well-known/acme-challenge/ {
        proxy_pass http://sivaros_dev;
    }
    
    # Health check
    location /health {
        proxy_pass http://sivaros_dev;
        access_log off;
    }
}

