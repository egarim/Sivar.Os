# HAProxy Configuration for Load Balancer (86.48.30.122)
# Forward dev.sivar.lat to Sivar.Os Dev Server (86.48.30.123)

global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  3600000
    timeout server  3600000

frontend http-in
    bind *:80
    
    # ACL for dev.sivar.lat
    acl is_dev_sivar hdr(host) -i dev.sivar.lat
    
    # Forward to Sivar.Os dev backend
    use_backend sivaros_dev if is_dev_sivar
    
    # Default backend (if needed)
    default_backend sivaros_dev

backend sivaros_dev
    balance roundrobin
    option forwardfor
    http-request set-header X-Forwarded-Proto http
    
    # Dev server
    server dev1 86.48.30.123:80 check

