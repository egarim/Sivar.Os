<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Login - Sivar.Os</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .dev-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="email"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .quick-logins {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e1e8ed;
        }
        
        .quick-logins h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .quick-btn {
            width: 100%;
            padding: 10px;
            background: #f7f9fc;
            border: 1px solid #e1e8ed;
            border-radius: 6px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: #e9ecef;
            border-color: #667eea;
        }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sivar.Os</h1>
            <span class="dev-badge">Development Mode</span>
            <p class="subtitle">Quick login for testing</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="test@sivar.os" 
                    required
                    autocomplete="email"
                >
            </div>
            
            <button type="submit" id="loginBtn">
                <span id="btnText">Login / Create Account</span>
            </button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="quick-logins">
            <h3>Quick Test Accounts</h3>
            <button class="quick-btn" onclick="quickLogin('admin@sivar.os')">👤 Admin User</button>
            <button class="quick-btn" onclick="quickLogin('test@sivar.os')">🧪 Test User</button>
            <button class="quick-btn" onclick="quickLogin('demo@sivar.os')">🎭 Demo User</button>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const message = document.getElementById('message');
        
        function quickLogin(email) {
            emailInput.value = email;
            form.requestSubmit();
        }
        
        function showMessage(text, type) {
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
        }
        
        function hideMessage() {
            message.style.display = 'none';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();
            
            const email = emailInput.value.trim();
            if (!email) {
                showMessage('Please enter an email address', 'error');
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span>Logging in...';
            
            try {
                const response = await fetch('/api/DevAuth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage(`Welcome ${data.displayName}! Redirecting...`, 'success');
                    
                    // Redirect to home after short delay
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                    loginBtn.disabled = false;
                    btnText.textContent = 'Login / Create Account';
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
                loginBtn.disabled = false;
                btnText.textContent = 'Login / Create Account';
            }
        });
        
        // Auto-focus email input
        emailInput.focus();
    </script>
</body>
</html>
