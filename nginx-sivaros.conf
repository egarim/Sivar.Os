# Sivar.Os Nginx Configuration
# Replace YOUR_DOMAIN with actual domain (e.g., app.sivar.lat)

upstream sivaros_backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    
    # Redirect to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
    
    # Temporary: Allow HTTP for testing
    location / {
        proxy_pass http://sivaros_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for Blazor SignalR
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        proxy_pass http://sivaros_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://sivaros_backend;
        access_log off;
    }
}

